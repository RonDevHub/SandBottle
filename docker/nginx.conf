server {
    listen 80;
    server_name _;
    
    # Root für statische Dateien (JS, CSS, Audio)
    root /var/www/html/public;
    index index.php index.html;

    # Wichtig für Debugging
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Verarbeitung
    location ~ \.php$ {
        # Falls die Datei nicht da ist -> 404 statt "File not found"
        try_files $uri =404;
        
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        
        include fastcgi_params;
        
        # ABSOLUTER PFAD: Das hier ist die Lösung für "File not found"
        # Wir sagen PHP-FPM exakt, wo die Datei liegt
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # Assets Cache
    location /assets/ {
        access_log off;
        expires 30d;
    }
}
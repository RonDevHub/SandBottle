server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Absolute Pfad-Definition
    root /var/www/html/public;
    index index.php index.html;

    server_name _;

    # Wichtig: Falls du Port-Mapping nutzt (z.B. 9992:80)
    # Nginx muss nicht wissen, welcher Port außen anliegt.
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Sektion komplett ohne "if"-Logik
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        
        include fastcgi_params;
        
        # Wir schreiben den Pfad hier ABSOLUT rein:
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # Assets Pfad fixieren
    location /assets/ {
        alias /var/www/html/public/assets/;
        access_log off;
        expires 30d;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}